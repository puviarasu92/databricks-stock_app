name: Deploy Databricks App

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'scripts/deploy_to_databricks.py'
      - 'requirements.txt'
      - '.streamlit/**'
      - '.github/workflows/deploy-databricks.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install deployment dependency
      run: |
        python -m pip install --upgrade pip
        pip install databricks-sdk

    - name: Deploy app to Databricks
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        DATABRICKS_WORKSPACE_PATH: ${{ secrets.DATABRICKS_WORKSPACE_PATH }}
      run: |
        python scripts/deploy_to_databricks.py \
          --host "$DATABRICKS_HOST" \
          --token "$DATABRICKS_TOKEN" \
          --workspace-path "$DATABRICKS_WORKSPACE_PATH" \
          --app-name databricks-gold-table-viewer
